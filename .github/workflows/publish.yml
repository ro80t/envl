name: Publish

on:
  push:
  pull_request:

permissions:
  id-token: write

jobs:
  version:
    name: check versioning
    runs-on: ubuntu-latest

    outputs:
        is-new-version: ${{ steps.version-check.outputs.is-new-version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/workflows/setup

      - name: Tag check
        continue-on-error: true
        shell: bash
        id: version-check
        run: |
          [[ '${{ github.ref }}' == refs/tags/v+([0-9])\.+([0-9])\.+([0-9])*([a-zA-Z]) ]]
          echo "is-new-version=$?" >> "$GITHUB_OUTPUT"

  crates-io:
    name: crates.io
    runs-on: ubuntu-latest

    needs: version

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/workflows/setup

      - name: CI for Publish
        id: ci
        if: needs.version.outputs.is-new-version != '0'
        run: cargo publish --workspace --dry-run

      - name: Publish
        if: steps.ci.conclusion == 'skipped'
        run: cargo publish --workspace
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  npmjs-com:
    name: npmjs.com
    runs-on: ubuntu-latest

    needs: version

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/workflows/setup

      - name: CI for Publish
        id: ci
        if: needs.version.outputs.is-new-version != '0'
        run: npm publish --provenance --access public -w envl-cli --dry-run

      - name: Publish
        if: steps.ci.conclusion == 'skipped'
        run: npm publish --provenance --access public -w envl-cli
